 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ movie.name }} - Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row">
        <div class="col-md-4">
            <img src="{{ movie.image.url }}" class="img-fluid rounded shadow" alt="{{ movie.name }}">
            <h2 class="mt-3">{{ movie.name }}</h2>
            <p><strong>Rating:</strong> ⭐ {{ movie.rating }}</p>
            <a href="{% url 'theater_list' movie.id %}" class="btn btn-danger btn-lg w-100 mt-3">Book Tickets Now</a>
        </div>

        <div class="col-md-8">
            <h3>Official Trailer</h3>
            <hr>
            {% if movie.embed_url %}
                <div class="ratio ratio-16x9 shadow rounded overflow-hidden">
                    <iframe 
                        src="{{ movie.embed_url }}" 
                        title="YouTube video player" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen>
                    </iframe>
                </div>
            {% else %}
                <div class="alert alert-warning">Trailer not available.</div>
            {% endif %}

            <div class="mt-4">
                <h4>Description</h4>
                <p>{{ movie.description }}</p>
                <h4>Cast</h4>
                <p>{{ movie.cast }}</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
